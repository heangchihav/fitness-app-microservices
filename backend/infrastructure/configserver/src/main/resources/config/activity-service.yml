spring:
  application:
    name: activity-service
  data:
    mongodb:
      uri: mongodb://mongodb:27017/fitnessactivity
      database: fitnessactivity
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: admin
    password: admin

server:
  port: 8082

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka:8761/eureka/

rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking