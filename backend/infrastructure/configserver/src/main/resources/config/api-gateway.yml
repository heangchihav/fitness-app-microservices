spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/realms/todo-oauth2/protocol/openid-connect/certs
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://userservice:8081
          predicates:
            - Path=/api/users/**
        - id: todo-service
          uri: http://todolistservice:8082
          predicates:
            - Path=/api/todos/**

server:
  port: 8080