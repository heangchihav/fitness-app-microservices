server:
  port: 8083

spring:
  data:
    mongodb:
      uri: mongodb://mongodb:27017/fitnessrecommendation
      database: fitnessrecommendation
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: admin
    password: admin


eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka:8761/eureka/


rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking


gemini:
  api:
    url: ${GEMINI_API_URL}
    key: ${GEMINI_API_KEY}