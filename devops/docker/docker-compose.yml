services:
  # PostgreSQL Database for User and Todo Services
  postgres:
    image: postgres:15-alpine
    container_name: todo-postgres
    environment:
      POSTGRES_DB: todo_user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - app-network
    restart: unless-stopped

  # Keycloak OAuth2/OIDC Provider
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: todo-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8181
    ports:
      - "8181:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - app-network
    command:
      - start-dev
    restart: unless-stopped

  # Config Server
  configserver:
    build:
      context: ../../backend/infrastructure/configserver
      dockerfile: Dockerfile
    container_name: todo-configserver
    ports:
      - "8888:8888"
    networks:
      - app-network
    restart: unless-stopped

  # User Service
  userservice:
    build:
      context: ../../backend/infrastructure/userservice
      dockerfile: Dockerfile
    container_name: todo-userservice
    ports:
      - "8081:8081"
    networks:
      - app-network
    depends_on:
      - postgres
      - configserver
    restart: unless-stopped

  # Todo List Service
  todolistservice:
    build:
      context: ../../backend/services/todolistservice
      dockerfile: Dockerfile
    container_name: todo-todolistservice
    ports:
      - "8082:8082"
    networks:
      - app-network
    depends_on:
      - postgres
      - configserver
    restart: unless-stopped

  # API Gateway
  gateway:
    build:
      context: ../../backend/infrastructure/gateway
      dockerfile: Dockerfile
    container_name: todo-gateway
    ports:
      - "8080:8080"
    networks:
      - app-network
    depends_on:
      - configserver
      - keycloak
    restart: unless-stopped

volumes:
  postgres_data:
  keycloak_data:


networks:
  app-network:
    driver: bridge
