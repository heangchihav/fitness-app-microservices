version: '3.8'

services:
  # PostgreSQL Database for User Service
  postgres:
    image: postgres:15-alpine
    container_name: fitness-postgres
    environment:
      POSTGRES_DB: fitness_user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fitness-network

  # MongoDB for Activity and AI Services
  mongodb:
    image: mongo:7.0
    container_name: fitness-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - fitness-network

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: fitness-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - fitness-network

  # Keycloak OAuth2/OIDC Provider
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: fitness-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8181
    ports:
      - "8181:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - fitness-network
    command:
      - start-dev

  # Eureka Service Discovery
  eureka:
    build:
      context: ../../backend/infrastructure/eureka
      dockerfile: Dockerfile
    container_name: fitness-eureka
    ports:
      - "8761:8761"
    networks:
      - fitness-network
    depends_on:
      - postgres
      - mongodb
      - rabbitmq
      - keycloak
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/

  # Config Server
  configserver:
    build:
      context: ../../backend/infrastructure/configserver
      dockerfile: Dockerfile
    container_name: fitness-configserver
    ports:
      - "8888:8888"
    networks:
      - fitness-network
    depends_on:
      - eureka
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/

  # User Service
  userservice:
    build:
      context: ../../backend/infrastructure/userservice
      dockerfile: Dockerfile
    container_name: fitness-userservice
    ports:
      - "8081:8081"
    networks:
      - fitness-network
    depends_on:
      - postgres
      - eureka
      - configserver
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fitness_user_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://configserver:8888

  # Activity Service
  activityservice:
    build:
      context: ../../backend/services/activityservice
      dockerfile: Dockerfile
    container_name: fitness-activityservice
    ports:
      - "8082:8082"
    networks:
      - fitness-network
    depends_on:
      - mongodb
      - eureka
      - configserver
      - rabbitmq
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/fitness_activity_db
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://configserver:8888
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin

  # AI Service
  aiservice:
    build:
      context: ../../backend/services/aiservice
      dockerfile: Dockerfile
    container_name: fitness-aiservice
    ports:
      - "8083:8083"
    networks:
      - fitness-network
    depends_on:
      - mongodb
      - eureka
      - configserver
      - rabbitmq
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/fitness_ai_db
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://configserver:8888
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin

  # API Gateway
  gateway:
    build:
      context: ../../backend/infrastructure/gateway
      dockerfile: Dockerfile
    container_name: fitness-gateway
    ports:
      - "8080:8080"
    networks:
      - fitness-network
    depends_on:
      - eureka
      - configserver
      - userservice
      - activityservice
      - aiservice
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://configserver:8888

volumes:
  postgres_data:
  mongodb_data:
  rabbitmq_data:
  keycloak_data:


networks:
  fitness-network:
    driver: bridge
