services:
  # PostgreSQL Database for User and Todo Services
  postgres:
    image: postgres:15-alpine
    container_name: todo-postgres
    environment:
      POSTGRES_DB: todo_user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - todo-network
    restart: unless-stopped

  # Keycloak OAuth2/OIDC Provider
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: todo-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8181
    ports:
      - "8181:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - todo-network
    command:
      - start-dev
    restart: unless-stopped

  # Eureka Service Discovery
  eureka:
    build:
      context: ../../backend/infrastructure/eureka
      dockerfile: Dockerfile
    container_name: todo-eureka
    ports:
      - "8761:8761"
    networks:
      - todo-network
    depends_on:
      - postgres
      - keycloak
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
    restart: unless-stopped

  # Config Server
  configserver:
    build:
      context: ../../backend/infrastructure/configserver
      dockerfile: Dockerfile
    container_name: todo-configserver
    ports:
      - "8888:8888"
    networks:
      - todo-network
    depends_on:
      - eureka
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
    restart: unless-stopped

  # User Service
  userservice:
    build:
      context: ../../backend/infrastructure/userservice
      dockerfile: Dockerfile
    container_name: todo-userservice
    ports:
      - "8081:8081"
    networks:
      - todo-network
    depends_on:
      - postgres
      - eureka
      - configserver
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/todo_user_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: true
      EUREKA_CLIENT_FETCH_REGISTRY: true
      SPRING_CONFIG_IMPORT: optional:configserver:http://configserver:8888
    restart: unless-stopped

  # Todo List Service
  todolistservice:
    build:
      context: ../../backend/services/todolistservice
      dockerfile: Dockerfile
    container_name: todo-todolistservice
    ports:
      - "8082:8082"
    networks:
      - todo-network
    depends_on:
      - postgres
      - eureka
      - configserver
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/todolist_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: true
      EUREKA_CLIENT_FETCH_REGISTRY: true
      SPRING_CONFIG_IMPORT: optional:configserver:http://configserver:8888
    restart: unless-stopped

  # API Gateway
  gateway:
    build:
      context: ../../backend/infrastructure/gateway
      dockerfile: Dockerfile
    container_name: todo-gateway
    ports:
      - "8080:8080"
    networks:
      - todo-network
    depends_on:
      - eureka
      - configserver
      - keycloak
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://configserver:8888
    restart: unless-stopped

volumes:
  postgres_data:
  keycloak_data:


networks:
  todo-network:
    driver: bridge
